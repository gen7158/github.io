    <script>
        const langBtn = document.getElementById('langToggleBtn');
        const savedLang = localStorage.getItem('langMode') || 'mode-jp';
        document.body.classList.remove('mode-jp', 'mode-en');
        document.body.classList.add(savedLang);
        langBtn.innerText = savedLang === 'mode-jp' ? 'Switch to English' : '日本語に切り替え';

        langBtn.addEventListener('click', () => {
            const isJp = document.body.classList.contains('mode-jp');
            const newMode = isJp ? 'mode-en' : 'mode-jp';
            document.body.classList.remove('mode-jp', 'mode-en');
            document.body.classList.add(newMode);
            localStorage.setItem('langMode', newMode);
            langBtn.innerText = newMode === 'mode-jp' ? 'Switch to English' : '日本語に切り替え';
            window.dispatchEvent(new Event('resize'));
        });
    </script>
